name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  workers:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # dev ブランチへの push → dev 環境へ自動デプロイ (D1 マイグレーション込み)
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [workers, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npx wrangler d1 migrations apply medicine-reminder-db-dev --env dev --remote
      - run: npx wrangler deploy --env dev

  # main ブランチへの push → 本番環境へ自動デプロイ (D1 マイグレーション込み)
  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [workers, frontend]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workers/package-lock.json
      - run: npm ci
      - run: npx wrangler d1 migrations apply medicine-reminder-db --remote
      - run: npx wrangler deploy
